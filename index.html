<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLBB Lucky Spin</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1e3a8a, #020617);
  color: white;
  text-align: center;
  font-family: Arial;
  overflow: hidden;
}

/* 🔥 Moving particles background */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(0,255,255,0.15), transparent);
  animation: moveBg 10s linear infinite;
  z-index: -1;
}
@keyframes moveBg {
  0% { transform: translate(-20%, -20%); }
  50% { transform: translate(0%, 0%); }
  100% { transform: translate(-20%, -20%); }
}

h1 {
  margin-top: 15px;
  text-shadow: 0 0 15px cyan;
}

.wheel-container {
  position: relative;
  width: 90vw;
  max-width: 320px;
  margin: 20px auto;
}

canvas {
  width: 100%;
  border-radius: 50%;
  border: 5px solid white;
  box-shadow: 0 0 30px cyan;
}

.pointer {
  width: 0;
  height: 0;
  border-left: 12px solid transparent;
  border-right: 12px solid transparent;
  border-bottom: 25px solid red;
  position: absolute;
  top: -5px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  filter: drop-shadow(0 0 10px red);
}

button {
  margin-top: 15px;
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  background: linear-gradient(45deg, gold, orange);
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 15px gold;
}

#result {
  margin-top: 15px;
  font-size: 18px;
}

/* 🎉 BIG CONFETTI */
.confetti {
  position: fixed;
  width: 12px;
  height: 12px;
  top: -10px;
  animation: fall 3s linear forwards;
}
@keyframes fall {
  to {
    transform: translateY(100vh) rotate(1080deg);
  }
}

/* 💥 FLASH EFFECT */
.flash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="flash" id="flash"></div>

<h1>🎡 MLBB Lucky Spin</h1>
<p>Spin & test your luck!</p>

<div class="wheel-container">
  <div class="pointer"></div>
  <canvas id="wheel" width="320" height="320"></canvas>
</div>

<button id="spinBtn">SPIN</button>

<div id="result"></div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const sections = [
  "Try Again","50 💎","Try Again","100 💎",
  "Try Again","Epic Skin","Try Again","JACKPOT"
];

const colors = [
  "#ff4d4d","#4dff88","#4da6ff","#ffd24d",
  "#ff66cc","#66ffff","#ffa64d","#b366ff"
];

const total = sections.length;
const arc = 2 * Math.PI / total;

/* DRAW */
for (let i = 0; i < total; i++) {
  ctx.beginPath();
  ctx.fillStyle = colors[i];
  ctx.moveTo(160,160);
  ctx.arc(160,160,160, i*arc, (i+1)*arc);
  ctx.fill();

  ctx.save();
  ctx.translate(160,160);
  ctx.rotate(i*arc + arc/2);
  ctx.fillStyle = "#000";
  ctx.font = "bold 13px Arial";
  ctx.fillText(sections[i], 60, 5);
  ctx.restore();
}

/* 🔊 BETTER SOUND SYSTEM */
const spinSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-slot-machine-spin-1935.mp3");
const winSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3");

let spinning = false;

document.getElementById("spinBtn").onclick = function () {
  if (spinning) return;
  spinning = true;

  spinSound.currentTime = 0;
  spinSound.play().catch(()=>{});

  const resultDiv = document.getElementById("result");

  let index = Math.floor(Math.random() * total);
  let anglePer = 360 / total;

  let finalAngle = 360 - (index * anglePer + anglePer / 2);
  let spinAngle = 3600 + finalAngle;

  canvas.style.transition = "none";
  canvas.style.transform = "rotate(0deg)";

  setTimeout(() => {
    canvas.style.transition = "transform 4s cubic-bezier(0.33,1,0.68,1)";
    canvas.style.transform = "rotate(" + spinAngle + "deg)";
  }, 50);

  setTimeout(() => {
    let reward = sections[index];
    resultDiv.innerHTML =
      "🎉 Result: " + reward + "<br>📸 Screenshot & DM!";

    /* 🎉 EVERY WIN CELEBRATION */
    if (!reward.includes("Try Again")) {
      winSound.currentTime = 0;
      winSound.play().catch(()=>{});
      flashEffect();
      launchConfetti();
    }

    spinning = false;
  }, 4000);
};

/* 💥 FLASH */
function flashEffect() {
  const flash = document.getElementById("flash");
  flash.style.opacity = "0.8";
  setTimeout(() => flash.style.opacity = "0", 150);
}

/* 🎉 CONFETTI */
function launchConfetti() {
  for (let i = 0; i < 80; i++) {
    let div = document.createElement("div");
    div.classList.add("confetti");
    div.style.left = Math.random() * 100 + "vw";
    div.style.background = ["red","yellow","blue","green","cyan","pink","orange"][Math.floor(Math.random()*7)];
    document.body.appendChild(div);

    setTimeout(() => div.remove(), 3000);
  }
}
</script>

</body>
</html>
