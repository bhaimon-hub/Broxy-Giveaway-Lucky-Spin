<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLBB Lucky Spin</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --deep-forest: #1a3c34;
      --cream: #fbfbf8;
      --soft-white: #ffffff;
      --gold-accent: #c4a77d;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--cream);
      color: #333;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
      padding: 0 20px 40px;
    }

    h1 {
      margin-top: 50px;
      margin-bottom: 10px;
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      color: var(--deep-forest);
    }

    .wheel-main-container {
      position: relative;
      width: 90vw;
      max-width: 380px;
      margin: 20px auto;
    }

    .pointer {
      width: 0; height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 30px solid var(--deep-forest);
      position: absolute;
      top: -10px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }

    canvas {
      width: 100%;
      border-radius: 50%;
      border: 8px solid var(--soft-white);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      transition: transform 5s cubic-bezier(0.2, 0, 0.1, 1);
    }

    button {
      margin-top: 30px;
      padding: 18px 50px;
      background-color: var(--deep-forest);
      color: var(--soft-white);
      border: none;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    button:disabled { background-color: #ccc; }

    #result { margin-top: 30px; min-height: 80px; position: relative; }

    /* PROFESSIONAL WIN EFFECT */
    .win-flash {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 1000;
    }

    .winner-announcement { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--deep-forest); }
    .winner-prize { color: var(--gold-accent); font-weight: 600; font-size: 32px; }

    .particle {
      position: absolute;
      width: 8px; height: 8px;
      pointer-events: none;
      border-radius: 2px;
    }
  </style>
</head>

<body>

<h1>🎯 MLBB LUCKY SPIN</h1>
<p>Spin the wheel and test your luck!</p>

<div class="wheel-main-container">
  <div class="pointer"></div>
  <canvas id="wheel" width="400" height="400"></canvas>
</div>

<button id="spinBtn">Spin Now</button>
<div id="result"></div>

<audio id="spinSound"><source src="https://assets.mixkit.co/active_storage/sfx/2005/2005-preview.mp3" type="audio/mpeg"></audio>
<audio id="winSound"><source src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" type="audio/mpeg"></audio>
<div id="flash" class="win-flash"></div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const spinBtn = document.getElementById("spinBtn");
const resultDiv = document.getElementById("result");
const spinSound = document.getElementById("spinSound");
const winSound = document.getElementById("winSound");
const flash = document.getElementById("flash");

const sections = ["Try Again", "50 Diamonds", "Basic Skin", "100 Diamonds", "Elite Skin", "Epic Skin", "Special Reward", "JACKPOT"];
const colors = ["#f4d3d3","#d1e7dd","#cfe2f3","#fff3cd","#e2e3e5","#f8d7da","#e0fbfc","#ffefdb"];

const total = sections.length;
const arc = (2 * Math.PI) / total;
let currentDeg = 0;

function drawWheel() {
  for (let i = 0; i < total; i++) {
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(200, 200);
    ctx.arc(200, 200, 200, i * arc, (i + 1) * arc);
    ctx.fill();

    ctx.save();
    ctx.translate(200, 200);
    ctx.rotate(i * arc + arc / 2);
    ctx.fillStyle = "#333";
    ctx.font = "bold 14px Montserrat";
    ctx.fillText(sections[i], 100, 5);
    ctx.restore();
  }
}
drawWheel();

spinBtn.onclick = function () {
  spinBtn.disabled = true;
  resultDiv.innerHTML = "";
  
  spinSound.currentTime = 0;
  spinSound.play();

  const winningIndex = Math.floor(Math.random() * total);
  
  // Logic Fix: Calculate degrees to put the winning slice under the pointer (top center)
  // Pointer is at 270 degrees. Each slice is 45 deg.
  const sliceDeg = 360 / total;
  const desiredStopsAt = 270 - (winningIndex * sliceDeg) - (sliceDeg / 2);
  
  // Add 5-10 extra full spins for speed
  const totalRotation = 3600 + desiredStopsAt; 
  
  // Increment rotation so it can spin multiple times without resetting
  currentDeg += totalRotation + (360 - (currentDeg % 360)); 
  
  canvas.style.transform = `rotate(${currentDeg}deg)`;

  setTimeout(() => {
    spinSound.pause();
    winSound.play();
    
    // Impact Effect
    flash.animate([{ opacity: 0.5 }, { opacity: 0 }], { duration: 500 });

    resultDiv.innerHTML = `
      <div class="winner-announcement">🎉 You Won:</div>
      <div class="winner-prize">${sections[winningIndex]}</div>
    `;

    spawnProfessionalParticles();
    spinBtn.disabled = false;
  }, 5000);
};

function spawnProfessionalParticles() {
  const colors = ['#c4a77d', '#1a3c34', '#ffffff', '#ff0000'];
  for (let i = 0; i < 100; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    p.style.left = '50%';
    p.style.top = '50%';
    resultDiv.appendChild(p);

    const angle = Math.random() * Math.PI * 2;
    const velocity = Math.random() * 200 + 100;
    const x = Math.cos(angle) * velocity;
    const y = Math.sin(angle) * velocity;

    p.animate([
      { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
      { transform: `translate(${x}px, ${y}px) scale(0)`, opacity: 0 }
    ], {
      duration: 1000 + Math.random() * 1000,
      easing: 'cubic-bezier(0, .9, .57, 1)'
    }).onfinish = () => p.remove();
  }
}
</script>
</body>
</html>
